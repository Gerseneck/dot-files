patch:
  ascii_composer/good_old_caps_lock: true
  ascii_composer/switch_key:
    Caps_Lock: commit_code
    Control_L: noop
    Control_R: noop
    Shift_L: noop
    Shift_R: commit_code
  "key_binder/bindings/+":
    - { accept: "Control+Shift+4", toggle: zh_hans, when: always }
    - { accept: "Control+Shift+dollar", toggle: zh_hans, when: always }
    - { accept: "Control+Shift+f", toggle: simplification, when: always }
    - { accept: "Control+Shift+F", toggle: simplification, when: always }
    - { accept: "Control+Shift+f", toggle: zh_hans, when: always }
    - { accept: "Control+Shift+F", toggle: zh_hans, when: always }
  menu/page_size: 8
  schema_list:
    - schema: luna_pinyin
    - schema: bopomofo_tw
    - schema: combo_pinyin
    - schema: terra_pinyin
  switcher/abbreviate_options: false
  "switcher/hotkeys/+":
    - "Control+Shift+s"
    - "Control+Shift+S"
