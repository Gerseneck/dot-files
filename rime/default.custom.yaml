patch:
  ascii_composer/good_old_caps_lock: true
  ascii_composer/switch_key:
    Caps_Lock: commit_code
    Control_L: noop
    Control_R: noop
    Shift_L: noop
    Shift_R: commit_code
  menu/page_size: 6
  schema_list:
    - schema: luna_pinyin
    - schema: bopomofo_tw
  switcher/abbreviate_options: false
  "switcher/hotkeys/+":
    - "Control+Shift+s"
    - "Control+Shift+S"
