patch:
  engine/filters:
    - simplifier
    - uniquifier
  switches:
    - abbrev: ["中", "Ａ"]
      name: ascii_mode
      reset: 0
      states: ["中文", "西文"]
    - name: full_shape
      reset: 0
      states: ["半角", "全角"]
    - abbrev: ["漢", "简"]
      name: simplification
      reset: 1
      states: ["漢字", "汉字"]
    - name: ascii_punct
      reset: 0
      states: ["。，", "．，"]
  translator/dictionary: luna_pinyin.ext
