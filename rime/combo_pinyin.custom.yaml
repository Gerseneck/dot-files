patch:
  switches:
    - abbrev: ["中", "A"]
      name: ascii_mode
      reset: 0
      states: ["中文", "西文"]
    - name: full_shape
      states: ["半角", "全角"]
      reset: 0
    - name: simplification
      states: ["漢字", "汉字"]
      reset: 0
    - name: ascii_punct
      states: ["。，", "．，"]
      reset: 0
  translator/dictionary: luna_pinyin.ext
