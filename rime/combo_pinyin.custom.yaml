patch:
  switches:
    - abbrev: ["中", "A"]
      name: ascii_mode
      reset: 0
      states: ["中文", "西文"]
    - name: full_shape
      states: ["半角", "全角"]
      reset: 0
    - name: simplification
      states: ["漢字", "汉字"]
      reset: 0
    - name: ascii_punct
      states: ["。，", "．，"]
      reset: 0
  translator/dictionary: luna_pinyin.ext
  __patch:
    - combo_pinyin_layouts_custom:/use_gerseneck_layout
    - combo_pinyin_layouts:/use_return_to_commit_raw_input
    - grammar:/hant?
    - combo_pinyin.custom:/patch?
