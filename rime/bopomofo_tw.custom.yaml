patch:
  switches:
    - abbrev: ["中", "Ａ"]
      name: ascii_mode
      reset: 0
      states: ["中文", "西文"]
    - name: full_shape
      reset: 0
      states: ["半角", "全角"]
    - abbrev: ["漢", "简", "港", "臺"]
      options: ["zh_hant", "zh_hans", "zh_hant_hk", "zh_hant_tw"]
      reset: 3
      states: ["傳統漢字", "简化字", "香港字形", "臺灣字形"]
    - name: ascii_punct
      reset: 1
      states: ["。，", "．，"]
  translator/dictionary: terra_pinyin.ext
