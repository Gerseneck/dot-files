[[mgr.prepend_keymap]]
on = "<C-y>"
run = [ "plugin copy-file-contents", "yank" ]
desc = "Copy raw file contents"

[[mgr.prepend_keymap]]
on = "<C-y>"
run = "unyank"
desc = "Cancel the yank status"

[[mgr.prepend_keymap]]
on  = "M"
run = "plugin mount"
desc = "Open the mount plugin"

[[mgr.prepend_keymap]]
on = "f"
run = "plugin jump-to-char"
desc = "Jump to next file/directory that starts with the character following the command"

[[mgr.prepend_keymap]]
on = "C"
run = "plugin ouch"
desc = "Compress with ouch"

[[mgr.prepend_keymap]]
on = [ "g", "G" ]
run = "toggle_all"
desc = "Invert selection of all files"

[[mgr.prepend_keymap]]
on = [ "g", "s" ]
run = "link"
desc = "Symlink the absolute path of yanked files"

[[mgr.prepend_keymap]]
on = "Z"
run = "plugin fzf"
desc = "Jump to a file/directory via fzf"

[[mgr.prepend_keymap]]
on = [ "g", "D" ]
run = "cd ~/Documents"
desc = "Go ~/Documents"

[[mgr.prepend_keymap]]
on = [ "g", "m" ]
run = "cd ~/Music"
desc = "Go ~/Music"

[[mgr.prepend_keymap]]
on = [ "g", "p" ]
run = "cd ~/Pictures"
desc = "Go ~/Pictures"

[[mgr.prepend_keymap]]
on = [ "g", "v" ]
run = "cd ~/Videos"
desc = "Go ~/Videos"

[[mgr.prepend_keymap]]
on = [ "g", "e" ]
run = "cd ~/Desktop"
desc = "Go ~/Desktop"
